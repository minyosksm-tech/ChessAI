  <style>
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
      color: #fafafa;
      min-height: 100vh;
    }
    .lesson-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(99, 102, 241, 0.2); }
    .category-btn.active { transform: scale(1.05); }
    .lesson-item:hover { background-color: #2a2a3e; }
    .back-btn:hover { background-color: #1c1c1c; }
    .tip-box { border-left: 4px solid #6366f1; background: linear-gradient(to right, rgba(99, 102, 241, 0.2), #0a0a0a); }
    
    /* Chessboard styles */
    .chessboard-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .chessboard {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      width: min(320px, 85vw);
      height: min(320px, 85vw);
      border: 3px solid #4f46e5;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(79, 70, 229, 0.3);
    }
    .square {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: min(2.5rem, 8vw);
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .square.light { background-color: #f0d9b5; }
    .square.dark { background-color: #b58863; }
    .square.highlight { 
      background-color: rgba(99, 102, 241, 0.6) !important;
      box-shadow: inset 0 0 0 3px #6366f1;
    }
    .square.teaching-move {
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: inset 0 0 0 3px #22c55e; }
      50% { box-shadow: inset 0 0 0 6px #22c55e, 0 0 20px rgba(34, 197, 94, 0.5); }
    }
    
    /* Buddy Robot styles */
    .buddy-container {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      background: linear-gradient(135deg, rgba(79, 70, 229, 0.15), rgba(139, 92, 246, 0.1));
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 1rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .buddy-avatar {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      flex-shrink: 0;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
      animation: buddy-bounce 2s infinite;
    }
    @keyframes buddy-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .buddy-speech { flex: 1; }
    .buddy-name {
      font-weight: 600;
      color: #818cf8;
      font-size: 0.875rem;
      margin-bottom: 0.25rem;
    }
    .buddy-message {
      color: #e2e8f0;
      line-height: 1.6;
      font-size: 0.95rem;
    }
    .buddy-message strong { color: #a5b4fc; }
    .buddy-message em {
      color: #fbbf24;
      font-style: normal;
      font-weight: 600;
    }
    
    /* Progress bar */
    .progress-bar {
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      transition: width 0.5s ease;
      border-radius: 3px;
    }
    
    .lesson-content {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 0.75rem;
      padding: 1rem;
      margin: 0.75rem 0;
    }
    
    .completed-badge {
      background: linear-gradient(135deg, #22c55e, #16a34a);
    }

</head>

    let currentCategory = 'all';
    let currentModule = null;
    let completedLessons = JSON.parse(localStorage.getItem('completedLessons') || '[]');
    
    function updateProgress() {
      const total = lessonsData.reduce((sum, module) => sum + module.lessons.length, 0);
      const completed = completedLessons.length;
      const percent = Math.round((completed / total) * 100);
      document.getElementById('progressBar').style.width = percent + '%';
    }
    
    function goBack() {
      window.location.href = '/';
    }

    function filterCategory(category) {
      currentCategory = category;
      document.querySelectorAll('.category-btn').forEach(btn => {
        if (btn.dataset.category === category) {
          btn.classList.add('active');
          btn.classList.remove('border-indigo-500/50', 'text-indigo-300');
          btn.classList.add('bg-indigo-600', 'text-white');
        } else {
          btn.classList.remove('active', 'bg-indigo-600', 'text-white');
          btn.classList.add('border-indigo-500/50', 'text-indigo-300');
        }
      });
      renderLessons();
    }

    function isLessonCompleted(lessonId) {
      return completedLessons.includes(lessonId);
    }

    function markLessonCompleted(lessonId) {
      if (!completedLessons.includes(lessonId)) {
        completedLessons.push(lessonId);
        localStorage.setItem('completedLessons', JSON.stringify(completedLessons));
        updateProgress();
      }
    }

    function renderLessons() {
      const filtered = currentCategory === 'all' 
        ? lessonsData 
        : lessonsData.filter(l => l.category === currentCategory);
      
      const container = document.getElementById('lessonsList');
      container.innerHTML = filtered.map(lesson => {
        const completedCount = lesson.lessons.filter(l => isLessonCompleted(l.id)).length;
        const totalCount = lesson.lessons.length;
        const allCompleted = completedCount === totalCount;
        
        return `
          <div class="lesson-card bg-neutral-800/80 rounded-xl p-4 border border-indigo-500/20 transition-all duration-300 cursor-pointer ${allCompleted ? 'ring-2 ring-green-500/50' : ''}" onclick="openModule('${lesson.id}')">
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center">
                <span class="text-3xl mr-3">${lesson.icon}</span>
                <div>
                  <h3 class="font-semibold text-white text-lg">${lesson.title}</h3>
                  <p class="text-xs text-gray-500">${lesson.level} • ${lesson.duration}</p>
                </div>
              </div>
              <div class="flex items-center gap-2">
                ${allCompleted ? `
                  <span class="completed-badge text-white text-xs px-2 py-1 rounded-full flex items-center gap-1">
                    <span>✓</span> Complete
                  </span>
                ` : `
                  <span class="text-xs px-2 py-1 rounded-full bg-indigo-900/50 text-indigo-300">
                    ${completedCount}/${totalCount}
                  </span>
                `}
              </div>
            </div>
            <div class="space-y-2 mt-3">
              ${lesson.lessons.slice(0, 3).map(l => `
                <div class="lesson-item px-3 py-2 rounded-lg bg-neutral-900/50 text-sm ${isLessonCompleted(l.id) ? 'text-green-400' : 'text-gray-300'} flex items-center justify-between">
                  <span>${l.title}</span>
                  ${isLessonCompleted(l.id) ? '<span class="text-green-500">✓</span>' : '<span class="text-gray-600">→</span>'}
                </div>
              `).join('')}
            </div>
            ${lesson.lessons.length > 3 ? `<p class="text-xs text-indigo-400 mt-3 text-center">+ ${lesson.lessons.length - 3} more lessons</p>` : ''}
          </div>
        `;
      }).join('');

    function openModule(moduleId) {

      if (!module) return;
      
      currentModule = module;
      const container = document.getElementById('modalContent');
      container.innerHTML = `
        <h2 class="text-xl font-bold text-white mb-2">${module.icon} ${module.title}</h2>
        <p class="text-gray-400 text-sm mb-4">${module.level} • ${module.duration}</p>
        <div class="space-y-3">
          ${module.lessons.map((lesson, idx) => `

              <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">

                  <span class="font-medium ${isLessonCompleted(lesson.id) ? 'text-green-300' : 'text-gray-200'}">${lesson.title}</span>

            ${lesson.moves.map(m => `
              <div class="flex items-start gap-2">
                <span class="text-indigo-400 mt-1">•</span>
                <span class="text-gray-200">${m.text}</span>
              </div>
            `).join('')}
          </div>
        </div>
        
        <!-- Tip Box -->
        <div class="tip-box p-4 rounded-lg mb-4">
          <p class="text-indigo-300 text-sm"><span class="mr-2">💡</span>${lesson.tip}</p>
        </div>
        
        <!-- Progress Indicator -->
        <div class="text-center text-gray-500 text-sm mb-4">
          Lesson ${currentIdx + 1} of ${currentModule.lessons.length}
        </div>
        
        <!-- Action Buttons -->
        <div class="space-y-3">
          ${nextLesson ? `
            <button onclick="openLesson('${nextLesson.id}')" class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-xl hover:bg-indigo-500 transition-colors flex items-center justify-center gap-2">
              ${isCompleted ? 'Review: ' : ''} Next: ${nextLesson.title}
              <span>→</span>
            </button>
          ` : `
            <button onclick="completeModule()" class="w-full bg-green-600 text-white font-semibold py-3 rounded-xl hover:bg-green-500 transition-colors flex items-center justify-center gap-2">
              ✓ Module Complete - Back to Lessons
            </button>
          `}
          <button onclick="markLessonCompleted('${lesson.id}'); renderLessons(); openModule('${currentModule.id}')" class="w-full ${isCompleted ? 'bg-green-900/50 text-green-300' : 'bg-neutral-700 text-gray-300'} font-medium py-2 rounded-xl hover:bg-neutral-600 transition-colors">
            ${isCompleted ? '✓ Marked as Completed' : 'Mark as Completed'}
          </button>
        </div>
      `;
      
      // Render chessboard
      renderBoard('lessonBoard', board, highlight);
    }
    
    function renderBoard(elementId, board, highlight = []) {
      const container = document.getElementById(elementId);
      if (!container) return;
      
      container.innerHTML = '';
      
      for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
          const square = document.createElement('div');
          const isLight = (row + col) % 2 === 0;
          square.className = `square ${isLight ? 'light' : 'dark'}`;
          
          const piece = board[row][col];
          if (piece) {
            square.textContent = PIECES[piece] || '';
            if (piece === piece.toUpperCase()) {
              square.style.color = '#1a1a1a';
            } else {
              square.style.color = '#fafafa';
            }
          }
          
          // Check if square should be highlighted
          const shouldHighlight = highlight.some(([r, c]) => r === row && c === col);
          if (shouldHighlight) {
            square.classList.add('teaching-move');
          }
          
          container.appendChild(square);
        }
      }
    }

    function completeModule() {
      if (currentModule) {
        currentModule.lessons.forEach(l => markLessonCompleted(l.id));
      }
      closeModal();
      renderLessons();
    }

    function closeModal() {
      document.getElementById('lessonModal').classList.add('hidden');
      document.getElementById('lessonModal').classList.remove('flex');
      currentModule = null;
    }

    // Initialize
    updateProgress();
    renderLessons();
    
    // Close modal on outside click
    document.getElementById('lessonModal').addEventListener('click', (e) => {
      if (e.target.id === 'lessonModal') closeModal();
    });
  </script>
</body>
</html>
